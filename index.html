<!DOCTYPE html>
<!--
================================================================================
  PICK YOUR SPERM — One Piece-styled character select
================================================================================
  A self-contained restyle of the Sperm Racer roster in a cel-shaded anime
  aesthetic, inspired by the reference art: a rounded expressive head, star /
  sparkle eyes, flowing hair, and a long tapering tail.

  Every character is hand-drawn in inline SVG (no image assets), so the whole
  thing is one portable file. Cel shading = flat base fill + a single shadow
  shape + a soft highlight, all wrapped in warm dark outlines.
================================================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Pick Your Sperm — One Piece Style</title>
<style>
  :root{
    --ink:#2a1712;          /* warm anime outline */
    --paper:#fdf6e7;
    --teal:#0f2a30;
    --teal2:#14383f;
    --edge:rgba(120,225,210,.35);
    --gold:#ffcf5a;
    --glow:#5ff0d8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; min-height:100%}
  body{
    font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;
    color:var(--paper);
    /* warm One Piece outdoor backdrop fading into a cinematic dark frame */
    background:
      radial-gradient(120% 80% at 50% -10%, #c9763e 0%, #8a4a2a 30%, #3a2418 60%, #140d09 100%),
      #100b07;
    background-attachment:fixed;
    padding:18px 12px calc(110px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  /* faint painterly halftone for the anime print feel */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.10;
    background-image:radial-gradient(rgba(0,0,0,.6) 1px, transparent 1.4px);
    background-size:5px 5px; mix-blend-mode:multiply;
  }

  .stage{position:relative; z-index:1; max-width:760px; margin:0 auto}

  /* ----------------------------- title ----------------------------- */
  header{text-align:center; margin:6px 0 16px}
  .kicker{
    display:inline-block; font-size:12px; letter-spacing:5px; text-transform:uppercase;
    color:#ffe9c2; opacity:.85; margin-bottom:6px;
  }
  h1{
    margin:0; font-size:clamp(34px,9vw,68px); line-height:.92; font-weight:900;
    font-style:italic; letter-spacing:1px; color:#fff;
    -webkit-text-stroke:3px var(--ink);
    paint-order:stroke fill;
    text-shadow:
      0 4px 0 var(--ink),
      0 6px 18px rgba(0,0,0,.5),
      0 0 30px rgba(255,207,90,.35);
    transform:rotate(-1.5deg);
  }
  h1 .pop{color:var(--gold)}
  .blurb{
    margin:12px auto 0; max-width:440px; font-size:14px; line-height:1.5;
    color:#ffeccb; opacity:.9;
  }

  /* ----------------------------- grid ------------------------------ */
  .grid{
    display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-top:18px;
  }

  .card{
    position:relative; cursor:pointer; border-radius:18px; overflow:hidden;
    background:linear-gradient(180deg,var(--teal2),var(--teal));
    border:2px solid rgba(255,255,255,.10);
    box-shadow:0 10px 26px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06);
    transition:transform .12s ease, box-shadow .2s, border-color .2s;
    isolation:isolate;
  }
  .card:hover{transform:translateY(-3px)}
  .card:active{transform:scale(.985)}

  /* anime speed-lines that flash on hover/selection */
  .card::after{
    content:""; position:absolute; inset:0; z-index:3; pointer-events:none; opacity:0;
    background:repeating-conic-gradient(from 0deg at 50% 42%,
      rgba(255,255,255,.0) 0deg 6deg, rgba(255,255,255,.16) 6deg 7deg);
    mask:radial-gradient(circle at 50% 42%, transparent 38%, #000 60%);
    -webkit-mask:radial-gradient(circle at 50% 42%, transparent 38%, #000 60%);
    transition:opacity .2s;
  }
  .card:hover::after{opacity:.5}

  /* warm portrait spotlight behind each character */
  .portrait{
    position:relative; aspect-ratio:1/1; width:100%;
    background:
      radial-gradient(75% 65% at 50% 40%, #ffd79a 0%, #d8884a 42%, #7c4326 78%, #43230f 100%);
  }
  .portrait svg{position:absolute; inset:0; width:100%; height:100%; display:block;
    filter:drop-shadow(0 8px 10px rgba(0,0,0,.35))}
  .tail{animation:sway 3.4s ease-in-out infinite; transform-origin:130px 150px}
  .card:nth-child(2n) .tail{animation-duration:3.9s}
  .card:nth-child(3n) .tail{animation-duration:4.3s}
  @keyframes sway{
    0%,100%{transform:rotate(-2.5deg)}
    50%{transform:rotate(2.5deg)}
  }
  @media (prefers-reduced-motion:reduce){ .tail{animation:none} }

  /* ribbon nameplate */
  .name{
    position:absolute; left:50%; bottom:8px; transform:translateX(-50%);
    z-index:4; white-space:nowrap;
    font-weight:900; font-style:italic; font-size:clamp(13px,3.4vw,17px); letter-spacing:.5px;
    color:#fff; padding:4px 16px; border-radius:8px;
    background:linear-gradient(180deg,#ff8a3d,#e0541f);
    border:2px solid var(--ink);
    box-shadow:0 3px 0 var(--ink), 0 6px 12px rgba(0,0,0,.4);
  }

  .info{padding:30px 12px 12px; text-align:center}
  .perk{font-size:12.5px; line-height:1.45; color:#cfeee8}
  .perk b{color:var(--gold)}

  /* selection state */
  .card.sel{border-color:var(--glow);
    box-shadow:0 0 0 2px var(--glow), 0 0 26px var(--glow), 0 12px 30px rgba(0,0,0,.5)}
  .card.sel::after{opacity:.65}
  .check{
    position:absolute; top:8px; right:8px; z-index:5;
    width:30px; height:30px; border-radius:50%;
    background:var(--glow); color:#06231f; font-weight:900; font-size:18px;
    display:grid; place-items:center; border:2px solid #06231f;
    transform:scale(0); transition:transform .18s cubic-bezier(.2,1.6,.4,1);
    box-shadow:0 0 14px var(--glow);
  }
  .card.sel .check{transform:scale(1)}

  /* ----------------------------- dock ------------------------------ */
  .dock{
    position:fixed; left:0; right:0; bottom:0; z-index:5;
    display:flex; justify-content:center;
    padding:12px 14px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,transparent, rgba(10,7,4,.85) 55%);
  }
  .lockin{
    appearance:none; cursor:pointer; font-family:inherit;
    font-weight:900; font-style:italic; letter-spacing:2px; font-size:18px; text-transform:uppercase;
    color:#3a1e0c; padding:15px 34px; border-radius:40px;
    border:3px solid var(--ink);
    background:linear-gradient(180deg,#ffd98a,#f0a23c 60%,#d97f24);
    box-shadow:0 5px 0 var(--ink), 0 12px 22px rgba(0,0,0,.5);
    transition:transform .1s, filter .2s; max-width:520px; width:100%;
  }
  .lockin:active{transform:translateY(4px); box-shadow:0 1px 0 var(--ink)}
  .lockin:disabled{filter:grayscale(.6) brightness(.8); cursor:not-allowed}
  .lockin small{display:block; font-size:11px; letter-spacing:1px; opacity:.8; font-style:normal}

  @media (max-width:380px){ .info{padding-top:26px} }

  /* --------------------- race-start overlay ----------------------- */
  #race{
    position:fixed; inset:0; z-index:50; display:none;
    flex-direction:column; align-items:center; justify-content:center; gap:10px;
    background:radial-gradient(120% 90% at 50% 30%, #134048, #07171b 70%, #020708);
    overflow:hidden;
  }
  #race.on{display:flex}
  /* speed lines streaking past */
  #race::before{
    content:""; position:absolute; inset:-20%; pointer-events:none; opacity:.5;
    background:repeating-linear-gradient(90deg,
      transparent 0 22px, rgba(255,255,255,.07) 22px 24px);
    animation:zip .5s linear infinite;
  }
  @keyframes zip{ to{ transform:translateX(-24px) } }
  #raceArt{width:min(48vw,210px); filter:drop-shadow(0 10px 18px rgba(0,0,0,.5));
    animation:bob 1.1s ease-in-out infinite}
  @keyframes bob{ 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-12px) rotate(2deg)} }
  #raceName{font-weight:900; font-style:italic; font-size:clamp(22px,7vw,40px); color:#fff;
    -webkit-text-stroke:2.5px var(--ink); paint-order:stroke fill; text-shadow:0 3px 0 var(--ink);
    z-index:1}
  #count{
    font-weight:900; font-size:clamp(70px,26vw,180px); line-height:1; color:var(--gold);
    -webkit-text-stroke:5px var(--ink); paint-order:stroke fill;
    text-shadow:0 0 40px rgba(255,207,90,.6); z-index:1;
  }
  .pulse{animation:pulse .6s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pulse{ 0%{transform:scale(.3); opacity:0} 60%{transform:scale(1.15)} 100%{transform:scale(1); opacity:1} }
  #raceNote{color:#bfe9e2; font-size:13px; z-index:1; max-width:300px; text-align:center; min-height:18px}
  #raceBack{
    margin-top:6px; z-index:1; appearance:none; cursor:pointer; font-family:inherit; font-weight:800;
    color:#cdeee8; background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.25);
    padding:10px 22px; border-radius:30px; letter-spacing:1px; display:none;
  }
  #raceBack.show{display:inline-block}
</style>
</head>
<body>
<div class="stage">
  <header>
    <span class="kicker">Sperm Racer • Roster</span>
    <h1>PICK YOUR <span class="pop">SPERM</span></h1>
    <p class="blurb">Each one's got their own flavor — Grand Line energy, nakama.
      Tap a racer to lock in.</p>
  </header>

  <div class="grid" id="grid"></div>
</div>

<div class="dock">
  <button class="lockin" id="lockin" disabled>
    Choose a racer
    <small id="hint">tap a card above</small>
  </button>
</div>

<!-- full-screen race-start sequence shown after LOCK IN -->
<div id="race" role="dialog" aria-modal="true" aria-label="Race starting">
  <svg id="raceArt" viewBox="0 0 200 260" aria-hidden="true"></svg>
  <div id="raceName"></div>
  <div id="count"></div>
  <div id="raceNote"></div>
  <button id="raceBack" type="button">‹ Pick a different racer</button>
</div>

<!--
  Each character is built from the same cel-shade kit:
   • a rounded HEAD (skin fill + a shadow wedge + a glossy highlight)
   • a flowing TAIL (tapering ribbon with a centre highlight, gently swaying)
   • hair / hat / accessories unique to the character
   • expressive eyes — several get the reference's signature STAR sparkle
  viewBox is 0 0 200 260 for every racer so they line up perfectly.
-->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
<defs>
  <!-- reusable star pupil -->
  <g id="star">
    <path d="M0,-7 L1.9,-2.3 L7,-2.2 L2.9,1 L4.4,6 L0,3 L-4.4,6 L-2.9,1 L-7,-2.2 L-1.9,-2.3 Z"/>
  </g>
  <!-- glossy highlight used on every head -->
  <radialGradient id="gloss" cx="35%" cy="28%" r="40%">
    <stop offset="0%" stop-color="#fff" stop-opacity=".75"/>
    <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
  </radialGradient>
</defs>
</svg>

<script>
/* ------------------------------------------------------------------ *
 *  Character data + SVG art. Kept in JS so the markup stays tidy and
 *  the roster is trivial to extend.
 * ------------------------------------------------------------------ */
const OUT = '#2a1712';        // warm outline used everywhere
const LINE = `stroke="${OUT}" stroke-linecap="round" stroke-linejoin="round"`;

/* Shared pieces ---------------------------------------------------- */

// Tapering tail ribbon. `c` = colour, `path` describes the centre spine.
function tail(c, shade){
  return `
  <g class="tail">
    <path d="M118,150
             C150,168 168,196 150,224
             C140,240 120,246 108,236
             C118,240 134,236 140,224
             C152,200 138,176 110,162 Z"
          fill="${c}" ${LINE} stroke-width="3"/>
    <path d="M120,158 C146,176 158,198 146,220"
          fill="none" stroke="${shade}" stroke-width="3" stroke-linecap="round" opacity=".5"/>
    <path d="M124,156 C144,172 154,194 146,214"
          fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity=".5"/>
  </g>`;
}

// Rounded head: base skin, a soft cel shadow on the right, and gloss.
function head(skin, shadow){
  return `
  <ellipse cx="100" cy="92" rx="64" ry="58" fill="${skin}" ${LINE} stroke-width="3.5"/>
  <path d="M100,34 C140,34 164,62 164,92 C164,128 134,150 100,150
           C150,140 156,96 138,60 C126,42 112,36 100,34 Z"
        fill="${shadow}" opacity=".55"/>
  <ellipse cx="78" cy="70" rx="26" ry="20" fill="url(#gloss)"/>`;
}

// Eyes. mode: 'star' (sparkle pupils), 'normal', 'shades', 'smolder', 'focus'.
function eyes(mode){
  if(mode==='shades'){
    return `
    <path d="M58,80 q42,-16 84,0 v10 q-42,14 -84,0 Z" fill="#10141a" ${LINE} stroke-width="3"/>
    <rect x="60" y="80" width="34" height="16" rx="6" fill="#1c2530"/>
    <rect x="106" y="80" width="34" height="16" rx="6" fill="#1c2530"/>
    <path d="M64,83 l10,8 M112,83 l10,8" stroke="#7fd8ff" stroke-width="2.5" opacity=".8"/>`;
  }
  const sclera = `
    <ellipse cx="80" cy="84" rx="15" ry="17" fill="#fff" ${LINE} stroke-width="3"/>
    <ellipse cx="120" cy="84" rx="15" ry="17" fill="#fff" ${LINE} stroke-width="3"/>`;
  if(mode==='star'){
    return sclera + `
    <g fill="${OUT}"><use href="#star" x="80" y="86"/><use href="#star" x="120" y="86"/></g>
    <circle cx="83" cy="82" r="2" fill="#fff"/><circle cx="123" cy="82" r="2" fill="#fff"/>`;
  }
  if(mode==='smolder'){
    return sclera + `
    <path d="M65,82 q15,-7 30,0 M105,82 q15,-7 30,0" fill="none" ${LINE} stroke-width="4"/>
    <circle cx="82" cy="88" r="6.5" fill="${OUT}"/><circle cx="118" cy="88" r="6.5" fill="${OUT}"/>
    <circle cx="84" cy="86" r="2" fill="#fff"/><circle cx="120" cy="86" r="2" fill="#fff"/>`;
  }
  if(mode==='focus'){
    return sclera + `
    <ellipse cx="80" cy="85" rx="6" ry="9" fill="${OUT}"/><ellipse cx="120" cy="85" rx="6" ry="9" fill="${OUT}"/>
    <circle cx="82" cy="81" r="2" fill="#fff"/><circle cx="122" cy="81" r="2" fill="#fff"/>`;
  }
  // normal
  return sclera + `
    <circle cx="81" cy="86" r="7" fill="${OUT}"/><circle cx="119" cy="86" r="7" fill="${OUT}"/>
    <circle cx="84" cy="83" r="2.4" fill="#fff"/><circle cx="122" cy="83" r="2.4" fill="#fff"/>`;
}

function brows(d){ return `<path d="${d}" fill="none" ${LINE} stroke-width="5"/>`; }
function mouth(d, w=3){ return `<path d="${d}" fill="none" ${LINE} stroke-width="${w}"/>`; }

/* ------------------------------ roster ---------------------------- */
const CHARS = [
  {
    id:'guido', name:'Guido Tony',
    perk:'Jersey’s finest. Mad drift skills + <b>gold chain swagger</b>.',
    skin:'#e7a877', shadow:'#b87646',
    art:`
      ${tail('#e7a877','#b87646')}
      ${head('#e7a877','#b87646')}
      <!-- stubble -->
      <path d="M60,108 q40,34 80,0 q-6,30 -40,30 q-34,0 -40,-30 Z" fill="#3a2a20" opacity=".28"/>
      <!-- slicked black pompadour -->
      <path d="M44,70 C46,30 86,16 100,24 C120,12 158,30 156,72
               C150,52 132,44 120,48 C126,40 112,36 104,42
               C96,34 84,40 86,50 C72,42 56,52 44,70 Z"
            fill="#15110f" ${LINE} stroke-width="3.5"/>
      <path d="M96,26 C108,30 116,40 118,50" fill="none" stroke="#3a332f" stroke-width="3" opacity=".7"/>
      ${brows('M62,70 q16,-9 30,-2 M108,68 q16,-7 30,2')}
      ${eyes('smolder')}
      ${mouth('M84,116 q16,10 32,-2',3.5)}
      <!-- gold chain -->
      <path d="M70,140 q30,22 60,0" fill="none" stroke="${'#ffcf5a'}" stroke-width="6"
            stroke-linecap="round" stroke-dasharray="1 7"/>
      <path d="M70,140 q30,22 60,0" fill="none" stroke="#caa12f" stroke-width="2"
            stroke-linecap="round" stroke-dasharray="1 7"/>
    `
  },
  {
    id:'seamus', name:'Seamus O’Lucky',
    perk:'Lucky Irish charm. Items spawn more often, <b>green beast</b>.',
    skin:'#f3d2ad', shadow:'#cf9f74',
    art:`
      ${tail('#f3d2ad','#cf9f74')}
      ${head('#f3d2ad','#cf9f74')}
      <!-- freckles -->
      <g fill="#c9794a" opacity=".7"><circle cx="66" cy="100" r="1.7"/><circle cx="74" cy="106" r="1.7"/>
        <circle cx="126" cy="100" r="1.7"/><circle cx="134" cy="106" r="1.7"/></g>
      <!-- big orange beard -->
      <path d="M52,96 C50,140 80,156 100,156 C120,156 150,140 148,96
               C150,124 124,140 100,140 C76,140 50,124 52,96 Z"
            fill="#d2622a" ${LINE} stroke-width="3.5"/>
      <path d="M70,128 q30,18 60,0" fill="none" stroke="#a8481c" stroke-width="3" opacity=".6"/>
      ${eyes('star')}
      ${brows('M64,68 q14,-7 28,-1 M108,67 q14,-6 28,1')}
      ${mouth('M86,118 q14,9 28,0',3.5)}
      <!-- green top hat with buckle -->
      <rect x="56" y="20" width="88" height="20" rx="5" fill="#1f7a3a" ${LINE} stroke-width="3.5"/>
      <path d="M64,24 h72 v-2 c0,-16 -18,-22 -36,-22 S64,6 64,22 Z"
            fill="#23924a" ${LINE} stroke-width="3.5"/>
      <rect x="60" y="26" width="80" height="10" fill="#15110f"/>
      <rect x="92" y="25" width="16" height="13" rx="2" fill="#ffcf5a" stroke="${OUT}" stroke-width="2.5"/>
      <rect x="97" y="29" width="6" height="5" fill="#15110f"/>
      <!-- clover -->
      <g transform="translate(150,118)" fill="#2fb255" stroke="${OUT}" stroke-width="2">
        <circle cx="-5" cy="-3" r="5"/><circle cx="5" cy="-3" r="5"/>
        <circle cx="0" cy="4" r="5"/><path d="M0,6 l2,12" stroke="#2fb255" stroke-width="3"/>
      </g>
    `
  },
  {
    id:'juan', name:'Juan Stallion',
    perk:'Latin lover energy. Blazing <b>straight-line speed</b>.',
    skin:'#d99863', shadow:'#a86b3c',
    art:`
      ${tail('#d99863','#a86b3c')}
      ${head('#d99863','#a86b3c')}
      <!-- swept brown hair -->
      <path d="M44,74 C42,34 96,18 128,34 C150,46 156,64 156,80
               C146,58 120,48 96,52 C76,56 56,62 44,90 Z"
            fill="#3c2415" ${LINE} stroke-width="3.5"/>
      <path d="M96,52 C112,50 132,56 150,76" fill="none" stroke="#5a3a22" stroke-width="3" opacity=".7"/>
      ${brows('M62,72 q16,-8 30,-2 M108,70 q16,-6 30,2')}
      ${eyes('smolder')}
      <!-- thick mustache -->
      <path d="M70,118 q30,-12 60,0 q-12,12 -30,12 q-18,0 -30,-12 Z"
            fill="#2e1c10" ${LINE} stroke-width="3"/>
      ${mouth('M86,128 q14,5 28,0',3)}
      <!-- red & gold striped collar -->
      <path d="M64,142 q36,24 72,0 v8 q-36,22 -72,0 Z" fill="#cf2e2e" ${LINE} stroke-width="3"/>
      <path d="M64,146 q36,22 72,0" fill="none" stroke="#ffcf5a" stroke-width="4"/>
      <!-- rose -->
      <g transform="translate(150,120)"><circle r="7" fill="#e23b4e" stroke="${OUT}" stroke-width="2"/>
        <circle r="3" fill="#ff7a88"/><path d="M0,7 l4,16" stroke="#2fb255" stroke-width="3"/></g>
    `
  },
  {
    id:'wei', name:'Wei Long',
    perk:'Dragon spirit. Laser-precise turns, <b>hard to spin out</b>.',
    skin:'#ecc39a', shadow:'#c0935f',
    art:`
      ${tail('#ecc39a','#c0935f')}
      ${head('#ecc39a','#c0935f')}
      <!-- black hair, centre-parted -->
      <path d="M46,72 C44,32 96,16 100,16 C104,16 156,32 154,72
               C146,48 120,40 100,40 C80,40 54,48 46,72 Z"
            fill="#14110f" ${LINE} stroke-width="3.5"/>
      <path d="M100,18 V40" stroke="#3a332f" stroke-width="2.5" opacity=".6"/>
      <!-- braid trailing off to the side -->
      <path d="M150,64 C172,80 176,110 162,134" fill="none" stroke="#14110f" stroke-width="9"
            stroke-linecap="round"/>
      <g stroke="#3a332f" stroke-width="2" opacity=".6">
        <path d="M156,78 l10,4 M158,94 l10,4 M158,110 l8,6"/></g>
      ${brows('M64,70 q14,-6 28,-1 M108,69 q14,-5 28,1')}
      ${eyes('focus')}
      ${mouth('M86,118 q14,5 28,0',3.5)}
      <!-- red martial-arts collar -->
      <path d="M64,142 q36,22 72,0 v8 q-36,22 -72,0 Z" fill="#c62f2f" ${LINE} stroke-width="3"/>
      <path d="M100,144 v18" stroke="#ffcf5a" stroke-width="3"/>
      <!-- tiny blue dragon companion -->
      <g transform="translate(150,116)">
        <path d="M-12,8 C-2,2 8,4 12,-6 C6,2 -2,0 -10,4 Z" fill="#3aa0e0" stroke="${OUT}" stroke-width="2"/>
        <circle cx="10" cy="-6" r="6" fill="#3aa0e0" stroke="${OUT}" stroke-width="2"/>
        <circle cx="12" cy="-7" r="1.6" fill="#fff"/>
        <path d="M6,-10 l-4,-6 M12,-12 l2,-7" stroke="${OUT}" stroke-width="2"/>
      </g>
    `
  },
  {
    id:'darius', name:'Darius King',
    perk:'Big baller. When you boost, you <b>BOOST</b>. King stuff.',
    skin:'#7a5037', shadow:'#54341f',
    art:`
      ${tail('#7a5037','#54341f')}
      ${head('#7a5037','#54341f')}
      ${brows('M62,70 q16,-7 30,-1 M108,69 q16,-6 30,1')}
      ${eyes('star')}
      <!-- royal mustache -->
      <path d="M72,116 q28,-10 56,0 q-12,11 -28,11 q-16,0 -28,-11 Z"
            fill="#1d130c" ${LINE} stroke-width="3"/>
      ${mouth('M86,126 q14,6 28,0',3)}
      <!-- gold crown -->
      <path d="M52,56 L60,24 L78,46 L100,16 L122,46 L140,24 L148,56 Z"

/* ----------------------------- render ----------------------------- */
const grid = document.getElementById('grid');
const lockin = document.getElementById('lockin');
const hint = document.getElementById('hint');
let selected = null;

CHARS.forEach(c=>{
  const card = document.createElement('button');
  card.className = 'card';
  card.type = 'button';
  card.dataset.id = c.id;
  card.setAttribute('aria-pressed','false');
  card.innerHTML = `
    <div class="check">✓</div>
    <div class="portrait">
      <svg viewBox="0 0 200 260" role="img" aria-label="${c.name}">${c.art}</svg>
      <div class="name">${c.name}</div>
    </div>
    <div class="info"><p class="perk">${c.perk}</p></div>`;
  card.addEventListener('click',()=>select(c, card));
  grid.appendChild(card);
});

function select(c, card){
  document.querySelectorAll('.card').forEach(el=>{
    el.classList.remove('sel'); el.setAttribute('aria-pressed','false');
  });
  card.classList.add('sel'); card.setAttribute('aria-pressed','true');
  selected = c.id;
  lockin.disabled = false;
  lockin.childNodes[0].nodeValue = 'Lock in & Race ';
  hint.textContent = c.name + ' is ready';
}

/* ------------------------- race-start flow ------------------------ *
 *  There's no race track wired up yet, so LOCK IN plays a full-screen
 *  3-2-1-GO start sequence with the chosen racer, stashes the pick in
 *  localStorage (so a real game can read `spermRacer.pick`), then waits
 *  on a "GO!" screen the player can back out of.
 * ------------------------------------------------------------------ */
const race    = document.getElementById('race');
const raceArt = document.getElementById('raceArt');
const raceName= document.getElementById('raceName');
const count   = document.getElementById('count');
const raceNote= document.getElementById('raceNote');
const raceBack= document.getElementById('raceBack');
let countTimer = null;

lockin.addEventListener('click',()=>{
  if(!selected) return;
  const c = CHARS.find(x=>x.id===selected);
  try{ localStorage.setItem('spermRacer.pick', selected); }catch(e){}

  raceArt.innerHTML = c.art;
  raceName.textContent = c.name;
  raceNote.textContent = '';
  raceBack.classList.remove('show');
  race.classList.add('on');

  const seq = ['3','2','1','GO!'];
  let i = 0;
  const tick = ()=>{
    count.textContent = seq[i];
    count.classList.remove('pulse'); void count.offsetWidth; count.classList.add('pulse');
    if(seq[i] === 'GO!'){
      raceNote.textContent = '🏁 And they’re off! (Hook up the race track to start the real game — your pick is saved.)';
      raceBack.classList.add('show');
      return;
    }
    i++; countTimer = setTimeout(tick, 800);
  };
  tick();
});

raceBack.addEventListener('click',()=>{
  clearTimeout(countTimer);
  race.classList.remove('on');
});
// Esc also backs out of the start sequence.
document.addEventListener('keydown', e=>{
  if(e.key === 'Escape' && race.classList.contains('on')){ raceBack.click(); }
});
</script>
