<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sperm Racer — Voxel Preview</title>
<style>
  html,body{margin:0;height:100%;background:#05202a;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#cfeee6;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  #c{display:block;width:100vw;height:100vh;touch-action:none;}
  #tag{position:fixed;left:0;right:0;top:env(safe-area-inset-top,12px);text-align:center;
    font-size:14px;letter-spacing:.5px;opacity:.85;pointer-events:none;}
  #tag b{color:#7df2d0}
  #hint{position:fixed;left:0;right:0;bottom:calc(env(safe-area-inset-bottom,16px) + 52px);text-align:center;
    font-size:12px;opacity:.55;pointer-events:none;}
  #toggle{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom,16px));
    padding:10px 22px;border:1px solid #2b6e66;border-radius:22px;background:rgba(10,40,46,.85);
    color:#7df2d0;font-size:15px;font-weight:600;}
</style>
</head>
<body>
<div id="tag"><b id="name">Salty — voxel</b> — drag to turn</div>
<canvas id="c"></canvas>
<div id="hint">Each voxel carries a colored shape that optically blends (Chuck Close style). WebGL — runs on iPad Safari.</div>
<button id="toggle">Show: Face</button>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="voxel-model.js"></script>
<script>
const T=THREE;
const renderer=new T.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));
const scene=new T.Scene(); scene.background=new T.Color(0x05202a);
scene.fog=new T.Fog(0x05202a, 120, 320);

const cam=new T.PerspectiveCamera(42, 1, 0.1, 2000);
function resize(){ const w=document.documentElement.clientWidth, h=document.documentElement.clientHeight;
  renderer.setSize(w,h,false); cam.aspect=w/h; cam.updateProjectionMatrix(); }
addEventListener('resize',resize);

scene.add(new T.AmbientLight(0xbfd8e0, 0.7));
const key=new T.DirectionalLight(0xffffff, 0.85); key.position.set(40,70,60); scene.add(key);
const fill=new T.DirectionalLight(0xff9ec4, 0.3); fill.position.set(-40,20,-30); scene.add(fill);

const hash=(x,y,z)=>{ let h=(x*73856093)^(y*19349663)^(z*83492791); return (h>>>0); };
// per-voxel contrasting accent (matches the PNG renderer): darker / lighter / channel-rotate
function accent(b,h){ const m=h%3;
  if(m===0) return [b[0]*0.42, b[1]*0.42, b[2]*0.42];
  if(m===1) return [Math.min(1,b[0]*0.4+0.65), Math.min(1,b[1]*0.4+0.65), Math.min(1,b[2]*0.4+0.65)];
  return [b[2], b[0], b[1]];
}

// Each voxel face = a tile: grout border + a shape (circle/square/diamond/triangle)
// drawn in the per-voxel ACCENT colour over the per-voxel BASE colour, computed
// procedurally from the cube-face UV in the fragment shader (true two-tone).
const faceMat=new T.ShaderMaterial({
  uniforms:{ lightDir:{ value:new T.Vector3(0.5,0.9,0.6).normalize() } },
  vertexShader:`
    attribute vec3 aBase; attribute vec3 aAccent; attribute float aShape;
    varying vec3 vBase; varying vec3 vAccent; varying float vShape; varying vec2 vUv; varying vec3 vN;
    void main(){
      vBase=aBase; vAccent=aAccent; vShape=aShape; vUv=uv;
      // build mat3 from columns (mat3(mat4) is invalid in GLSL ES 1.00 / WebGL1)
      mat3 im = mat3(instanceMatrix[0].xyz, instanceMatrix[1].xyz, instanceMatrix[2].xyz);
      mat3 mm = mat3(modelMatrix[0].xyz, modelMatrix[1].xyz, modelMatrix[2].xyz);
      vN = normalize(mm * im * normal);
      gl_Position = projectionMatrix * modelViewMatrix * instanceMatrix * vec4(position,1.0);
    }`,
  fragmentShader:`
    uniform vec3 lightDir;
    varying vec3 vBase; varying vec3 vAccent; varying float vShape; varying vec2 vUv; varying vec3 vN;
    void main(){
      vec2 uv=vUv; float du=uv.x-0.5, dv=uv.y-0.5; vec3 c;
      if(uv.x<0.1||uv.x>0.9||uv.y<0.1||uv.y>0.9){ c=vBase*0.45; }     // grout
      else {
        bool hit;
        if(vShape<0.5) hit=length(vec2(du,dv))<0.30;                   // circle
        else if(vShape<1.5) hit=max(abs(du),abs(dv))<0.27;             // square
        else if(vShape<2.5) hit=abs(du)+abs(dv)<0.33;                  // diamond
        else hit=(uv.y>0.30 && uv.y<0.76 && abs(du)<(0.76-uv.y)*0.75); // triangle
        c = hit ? vAccent : vBase;
      }
      float ndl=max(0.0, dot(normalize(vN), normalize(lightDir)));
      gl_FragColor=vec4(c*(0.5+0.55*ndl), 1.0);
    }`
});

const geo=new T.BoxGeometry(1,1,1);
let rig=new T.Group(); scene.add(rig);
let dist=60, isFace=false;

function clearRig(){ rig.traverse(o=>{ if(o.isMesh && o.geometry) o.geometry.dispose(); });
  scene.remove(rig); rig=new T.Group(); scene.add(rig); }

function build(model){
  clearRig();
  // Salty (our character) at a chunky res so each voxel is big enough to carry a shape
  const vox = model==='face' ? VoxelModel.buildFace(1.4) : VoxelModel.buildVoxels(1.6);
  // centre on the character (ignore env voxels)
  let mn=[1e9,1e9,1e9], mx=[-1e9,-1e9,-1e9];
  for(const v of vox){ if(v.env)continue;
    mn[0]=Math.min(mn[0],v.x);mn[1]=Math.min(mn[1],v.y);mn[2]=Math.min(mn[2],v.z);
    mx[0]=Math.max(mx[0],v.x);mx[1]=Math.max(mx[1],v.y);mx[2]=Math.max(mx[2],v.z); }
  const cx=(mn[0]+mx[0])/2, cy=(mn[1]+mx[1])/2, cz=(mn[2]+mx[2])/2;
  dist=Math.max(mx[0]-mn[0],mx[1]-mn[1],mx[2]-mn[2])*1.7;

  // one InstancedMesh; per-voxel base/accent/shape passed as instanced attributes
  const n=vox.length;
  const aBase=new Float32Array(n*3), aAccent=new Float32Array(n*3), aShape=new Float32Array(n);
  const g=geo.clone();
  const mesh=new T.InstancedMesh(g, faceMat, n);
  const dummy=new T.Object3D();
  vox.forEach((v,i)=>{
    dummy.position.set(v.x-cx,v.y-cy,v.z-cz); dummy.updateMatrix(); mesh.setMatrixAt(i,dummy.matrix);
    const b=[v.r/255,v.g/255,v.b/255], h=hash(v.x,v.y,v.z), a=accent(b,h);
    aBase[i*3]=b[0];aBase[i*3+1]=b[1];aBase[i*3+2]=b[2];
    aAccent[i*3]=a[0];aAccent[i*3+1]=a[1];aAccent[i*3+2]=a[2];
    aShape[i]=h%4;
  });
  g.setAttribute('aBase', new T.InstancedBufferAttribute(aBase,3));
  g.setAttribute('aAccent', new T.InstancedBufferAttribute(aAccent,3));
  g.setAttribute('aShape', new T.InstancedBufferAttribute(aShape,1));
  mesh.instanceMatrix.needsUpdate=true;
  rig.add(mesh);
}

build('salty');

document.getElementById('toggle').addEventListener('click',()=>{
  isFace=!isFace;
  build(isFace?'face':'salty');
  document.getElementById('name').textContent = isFace?'Chuck-Close Voxel Face':'Salty';
  document.getElementById('toggle').textContent = isFace?'Show: Salty':'Show: Face';
  yaw = isFace?0:0.6;
});

// drag-to-turn + gentle auto motion (face = sway so the flat back stays hidden; salty = full spin)
let yaw=0.6, pitch=0.35, autoT=0, dragging=false, lx=0, ly=0, vyaw=0;
const cv=renderer.domElement;
cv.addEventListener('pointerdown',e=>{dragging=true;lx=e.clientX;ly=e.clientY;autoT=0;cv.setPointerCapture(e.pointerId);});
cv.addEventListener('pointermove',e=>{ if(!dragging)return;
  vyaw=(e.clientX-lx)*0.01; yaw+=vyaw; pitch=Math.max(0.05,Math.min(1.1,pitch-(e.clientY-ly)*0.01));
  lx=e.clientX; ly=e.clientY; });
addEventListener('pointerup',()=>{dragging=false;});

resize();
let last=performance.now();
(function loop(now){ const dt=(now-last)/1000; last=now; autoT+=dt;
  if(!dragging){ vyaw*=0.94; yaw+=vyaw;
    if(autoT>1.0){ if(isFace) yaw=Math.sin(now*0.0004)*0.5; else yaw+=dt*0.35; } }
  if(isFace) yaw=Math.max(-0.9,Math.min(0.9,yaw));   // keep the relief face-on
  const r=dist, hy=Math.cos(pitch)*r;
  cam.position.set(Math.sin(yaw)*hy, Math.sin(pitch)*r, Math.cos(yaw)*hy);
  cam.lookAt(0,0,0);
  renderer.render(scene,cam);
  requestAnimationFrame(loop);
})(last);
</script>
</body>
</html>
